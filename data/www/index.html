    <h1 id="pageTitle">🧠 aMaker Bot Control panel.<span id="titleStatus" style="font-size: 0.6em; color: #999;"></span></h1>

  <div style="display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;">

    <div class="panel" style="flex:1;min-width:240px;">
      <h2>🔑 Master Control</h2>
      <div id="master-status-box" style="padding:8px 12px;border-radius:4px;margin-bottom:10px;font-size:13px;background:#f0f0f0;color:#555;">
        Checking master status…
      </div>
      <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;">
        <div style="flex:1;min-width:140px;">
          <label style="display:block;font-weight:bold;font-size:12px;margin-bottom:3px;" for="master-token-input">Token</label>
          <input id="master-token-input" type="text" placeholder="Enter bot token" autocomplete="off">
        </div>
        <button id="btn-register" class="btn" onclick="doRegister()">Register as Master</button>
        <button id="btn-unregister" class="btn" onclick="doUnregister()" style="background:#e53935;">Unregister</button>
      </div>
      <div id="master-feedback" style="margin-top:8px;font-size:12px;min-height:16px;"></div>
    </div>

    <div class="panel" style="flex:1;min-width:220px;">
      <h2>🖥️ K10 Display</h2>
      <div style="padding:8px 12px;border-radius:4px;font-size:13px;background:#f0f0f0;color:#555;line-height:1.6;">
        Display mode is controlled <strong>locally</strong> on the device.<br>
        Press <strong>Button A</strong> on the K10 to cycle through screens:<br>
        Splash → App Info → App Log → Svc Log → Debug Log → ESP Log
      </div>
    </div>

  </div>

  <script src="./index.js"></script>
  <div class="statusbar">
    <span class="status-left" id="page-status"></span>
    <span class="status-right">🏠 K10 Bot</span>
  </div>
</body>
</html>
