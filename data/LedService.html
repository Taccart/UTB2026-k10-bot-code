<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LED Control Panel</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    /* ── LED cards ──────────────────────────────────────────────────────── */
    .led-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 15px;
      margin: 20px 0;
    }
    .led-card {
      padding: 20px;
      border-radius: 12px;
      background: #1e1e2e;
      border: 2px solid #44475a;
      color: #a3a3a3;
    }
    .led-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid #44475a;
    }
    .led-title {
      font-size: 18px;
      font-weight: bold;
      color: #f8f8f8;
    }
    .led-status-badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 10px;
      background: #313244;
      color: #a6adc8;
      font-weight: bold;
    }
    .led-status-badge.on {
      background: #a6e3a1;
      color: #1e1e2e;
    }
    /* Glowing LED preview circle */
    .led-preview-wrap {
      text-align: center;
      margin: 10px 0 18px;
    }
    .led-preview {
      display: inline-block;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #11111b;
      border: 3px solid #585b70;
      transition: background 0.25s, box-shadow 0.25s;
    }
    .led-preview.lit {
      border-color: transparent;
    }
    /* Color picker */
    .color-picker-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .color-picker-wrap label {
      font-size: 13px;
      color: #a6adc8;
      font-weight: bold;
      flex-shrink: 0;
    }
    input[type="color"] {
      flex: 1;
      height: 48px;
      padding: 3px;
      border: 1px solid #585b70;
      border-radius: 6px;
      background: #313244;
      cursor: pointer;
    }
    /* LED card buttons */
    .led-btn-group {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }
    .led-btn-group button {
      flex: 1;
      padding: 8px 4px;
      font-size: 13px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: filter 0.15s;
    }
    .led-btn-group button:hover { filter: brightness(1.15); }
    .btn-led-off  { background: #45475a; color: #cdd6f4; }
    /* Global LED controls */
    .led-global {
      background: #1e1e2e;
      padding: 16px 20px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .led-global span {
      color: #a6adc8;
      font-size: 14px;
    }
    .btn-led-alloff {
      background: #787878;
      color: #1e1e2e;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
      transition: filter 0.15s;
    }
    .btn-led-alloff:hover { filter: brightness(1.1); }
    .btn-led-refresh {
      background: #89dceb;
      color: #1e1e2e;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
      transition: filter 0.15s;
    }
    .btn-led-refresh:hover { filter: brightness(1.1); }

    /* Toast notification */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      color: white;
      background: #333;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      z-index: 9999;
    }
    #toast.show { opacity: 1; }
    #toast.ok   { background: #4CAF50; }
    #toast.err  { background: #f44336; }

    /* Collapsible (reuse ServoService pattern) */
    .collapsible-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .collapsible-header h2 { margin: 0; }
    .collapse-btn {
      background: none;
      border: 1px solid #aaa;
      border-radius: 4px;
      padding: 2px 10px;
      font-size: 16px;
      cursor: pointer;
      color: #555;
      transition: transform 0.2s;
    }
    .collapse-btn.collapsed { transform: rotate(-90deg); }
    .collapsible-body {
      overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.3s ease;
      max-height: 2000px;
      opacity: 1;
    }
    .collapsible-body.collapsed { max-height: 0; opacity: 0; }

  </style>
</head>
<body>
  <h1 id="pageTitle">LED Control Panel
    <span id="ledStatusBadge" style="font-size:0.5em;color:#999;"></span>
  </h1>

  <div class="panel">
    <a href="/" class="btn">← Back to Home</a>
  </div>

  <!-- ══════════════════════ K10 BOARD  ════════════════════════ -->
  <div class="panel">
    <div class="collapsible-header" onclick="toggleSection('k10LedSection','k10LedBtnArrow')">
      <h2>RGB LEDs 0-1 on K10 board</h2>
      <button class="collapse-btn" id="k10LedBtnArrow" title="Collapse/Expand">▼</button>
    </div>
    <div class="collapsible-body" id="k10LedSection">
      <div class="led-global">
        <span>Global&nbsp;controls:</span>
        <button class="btn-led-alloff" onclick="turnOffAllK10LEDs()">⬛ Turn Off All</button>
        <button class="btn-led-refresh" onclick="fetchK10LEDStatus()">🔄 Refresh from Device</button>
      </div>
      <div class="led-grid" id="k10LedGrid">
        <!-- K10 board LED cards injected by JS -->
      </div>
    </div>
  </div>
  <!-- ═══════════════════════════════ DFR1216 BOARD  ═══════════════════════════ -->
  <div class="panel">
    <div class="collapsible-header" onclick="toggleSection('ledSection','ledBtnArrow')">
      <h2>RGB LEDs 0-1 on DFR1216 board</h2>
      <button class="collapse-btn" id="ledBtnArrow" title="Collapse/Expand">▼</button>
    </div>
    <div class="collapsible-body" id="ledSection">
      <div class="led-global">
        <span>Global&nbsp;controls:</span>
        <button class="btn-led-alloff" onclick="turnOffAllLEDs()">⬛ Turn Off All</button>
        <button class="btn-led-refresh" onclick="fetchLEDStatus()">🔄 Refresh from Device</button>
      </div>
      <div class="led-grid" id="ledGrid">
        <!-- LED cards injected by JS -->
      </div>
    </div>
  </div>


  <!-- ── Toast ── -->
  <div id="toast"></div>

  <script>
    // ═══════════════════════════════════════════════════════════════════════
    //  LED state
    // ═══════════════════════════════════════════════════════════════════════
    const leds = [
      { id: 0, r: 0, g: 0, b: 0 },
      { id: 1, r: 0, g: 0, b: 0 }
    ];

    // ── Generic fetch helper ──────────────────────────────────────────────
    async function apiGet(url) {
      try {
        const res = await fetch(url);
        return { ok: res.ok, status: res.status, data: await res.json() };
      } catch (e) {
        return { ok: false, error: e.message };
      }
    }

    async function apiPost(url) {
      try {
        const res = await fetch(url, { method: 'POST' });
        return { ok: res.ok, status: res.status, data: await res.json() };
      } catch (e) {
        return { ok: false, error: e.message };
      }
    }

    // ── Toast notification ────────────────────────────────────────────────
    let toastTimer = null;
    function showToast(msg, type = 'ok') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'show ' + type;
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { el.className = ''; }, 2500);
    }

    // ═══════════════════════════════════════════════════════════════════════
    //  LED rendering
    // ═══════════════════════════════════════════════════════════════════════
    function rgbToHex(r, g, b) {
      return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
    }
    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return { r, g, b };
    }

    function glowStyle(r, g, b) {
      const isOn = (r + g + b) > 0;
      if (!isOn) return '';
      const alpha = Math.min(1, (r + g + b) / 300);
      return `0 0 18px rgba(${r},${g},${b},${alpha.toFixed(2)}), 0 0 36px rgba(${r},${g},${b},${(alpha * 0.5).toFixed(2)})`;
    }

    function createLEDCard(led) {
      const isOn = (led.r + led.g + led.b) > 0;
      const hex  = rgbToHex(led.r, led.g, led.b);
      return `
        <div class="led-card" id="led-card-${led.id}">
          <div class="led-card-header">
            <div class="led-title">LED ${led.id}</div>
            <div class="led-status-badge ${isOn ? 'on' : ''}" id="led-badge-${led.id}">${isOn ? 'ON' : 'OFF'}</div>
          </div>
          <div class="led-preview-wrap">
            <div class="led-preview ${isOn ? 'lit' : ''}" id="led-preview-${led.id}"
                 style="background:${hex};box-shadow:${glowStyle(led.r, led.g, led.b)};"></div>
          </div>
          <div class="color-picker-wrap">
            <label>Color:</label>
            <input type="color" id="led-picker-${led.id}" value="${hex}"
                   oninput="onColorPick(${led.id}, this.value)">
            <span style="font-size:12px;color:#a6adc8;" id="led-hex-${led.id}">${hex}</span>
          </div>
          <div class="led-btn-group">
            <button class="btn-led-off" onclick="turnOffLED(${led.id})">⬛ Off</button>
          </div>
        </div>
      `;
    }

    function renderLEDs() {
      document.getElementById('ledGrid').innerHTML = leds.map(createLEDCard).join('');
    }

    const ledDebounce = {};

    function onColorPick(id, hex) {
      const { r, g, b } = hexToRgb(hex);
      leds[id].r = r; leds[id].g = g; leds[id].b = b;
      document.getElementById(`led-hex-${id}`).textContent = hex;
      updateLEDPreview(id, r, g, b);
      clearTimeout(ledDebounce[id]);
      ledDebounce[id] = setTimeout(() => setLEDColor(id), 300);
    }

    function updateLEDPreview(id, r, g, b) {
      const preview = document.getElementById(`led-preview-${id}`);
      const badge   = document.getElementById(`led-badge-${id}`);
      const hex     = rgbToHex(r, g, b);
      const isOn    = (r + g + b) > 0;
      preview.style.background = hex;
      preview.style.boxShadow  = glowStyle(r, g, b);
      preview.classList.toggle('lit', isOn);
      badge.textContent = isOn ? 'ON' : 'OFF';
      badge.className   = `led-status-badge${isOn ? ' on' : ''}`;
    }

    // ═══════════════════════════════════════════════════════════════════════
    //  LED API calls
    // ═══════════════════════════════════════════════════════════════════════
    async function setLEDColor(id) {
      const { r, g, b } = leds[id];
      const url = `/api/dfr1216/setLEDColor?led=${id}&red=${r}&green=${g}&blue=${b}`;
      const result = await apiPost(url);
      if (result.ok) {
        showToast(`LED ${id} set to RGB(${r},${g},${b})`, 'ok');
      } else {
        showToast(`Failed to set LED ${id}`, 'err');
      }
    }

    async function turnOffLED(id) {
      const result = await apiPost(`/api/dfr1216/turnOffLED?led=${id}`);
      if (result.ok) {
        leds[id].r = 0; leds[id].g = 0; leds[id].b = 0;
        document.getElementById(`led-picker-${id}`).value    = '#000000';
        document.getElementById(`led-hex-${id}`).textContent = '#000000';
        updateLEDPreview(id, 0, 0, 0);
        showToast(`LED ${id} turned off`, 'ok');
      } else {
        showToast(`Failed to turn off LED ${id}`, 'err');
      }
    }

    async function turnOffAllLEDs() {
      const results = await Promise.all(leds.map(l =>
        apiPost(`/api/dfr1216/turnOffLED?led=${l.id}`)
      ));
      const allOk = results.every(r => r.ok);
      if (allOk) {
        leds.forEach(l => { l.r = 0; l.g = 0; l.b = 0; });
        renderLEDs();
        showToast('All LEDs turned off', 'ok');
      } else {
        showToast('Some LEDs failed to turn off', 'err');
      }
    }

    async function fetchLEDStatus() {
      const result = await apiGet('/api/dfr1216/getLEDStatus');
      if (result.ok && result.data.leds) {
        result.data.leds.forEach(led => {
          leds[led.id].r = led.red;
          leds[led.id].g = led.green;
          leds[led.id].b = led.blue;
        });
        renderLEDs();
        showToast('LED status refreshed', 'ok');
      } else {
        showToast('Failed to fetch LED status', 'err');
      }
    }

    async function fetchServiceStatus() {
      const result = await apiGet('/api/dfr1216/getStatus');
      const badge  = document.getElementById('ledStatusBadge');
      if (result.ok && result.data.status) {
        badge.textContent = `[DFR1216: ${result.data.status}]`;
        badge.style.color = result.data.status === 'started' ? '#4CAF50' : '#FFA500';
      } else {
        badge.textContent = '[DFR1216: unreachable]';
        badge.style.color = '#f44336';
      }
    }

    // ═══════════════════════════════════════════════════════════════════════
    //  K10 Board LED state  (GET /api/board/v1/leds  – field key: "led")
    // ═══════════════════════════════════════════════════════════════════════
    const k10leds = [
      { id: 0, r: 0, g: 0, b: 0 },
      { id: 1, r: 0, g: 0, b: 0 },
      { id: 2, r: 0, g: 0, b: 0 }
    ];

    function createK10LEDCard(led) {
      const isOn = (led.r + led.g + led.b) > 0;
      const hex  = rgbToHex(led.r, led.g, led.b);
      return `
        <div class="led-card" id="k10-card-${led.id}">
          <div class="led-card-header">
            <div class="led-title">LED ${led.id}</div>
            <div class="led-status-badge ${isOn ? 'on' : ''}" id="k10-badge-${led.id}">${isOn ? 'ON' : 'OFF'}</div>
          </div>
          <div class="led-preview-wrap">
            <div class="led-preview ${isOn ? 'lit' : ''}" id="k10-preview-${led.id}"
                 style="background:${hex};box-shadow:${glowStyle(led.r, led.g, led.b)};"></div>
          </div>
          <div class="color-picker-wrap">
            <label>Color:</label>
            <input type="color" id="k10-picker-${led.id}" value="${hex}"
                   oninput="onK10ColorPick(${led.id}, this.value)">
            <span style="font-size:12px;color:#a6adc8;" id="k10-hex-${led.id}">${hex}</span>
          </div>
          <div class="led-btn-group">
            <button class="btn-led-off" onclick="turnOffK10LED(${led.id})">⬛ Off</button>
          </div>
        </div>
      `;
    }

    function renderK10LEDs() {
      document.getElementById('k10LedGrid').innerHTML = k10leds.map(createK10LEDCard).join('');
    }

    const k10LedDebounce = {};

    function onK10ColorPick(id, hex) {
      const { r, g, b } = hexToRgb(hex);
      k10leds[id].r = r; k10leds[id].g = g; k10leds[id].b = b;
      document.getElementById(`k10-hex-${id}`).textContent = hex;
      updateK10LEDPreview(id, r, g, b);
      clearTimeout(k10LedDebounce[id]);
      k10LedDebounce[id] = setTimeout(() => setK10LEDColor(id), 300);
    }

    function updateK10LEDPreview(id, r, g, b) {
      const preview = document.getElementById(`k10-preview-${id}`);
      const badge   = document.getElementById(`k10-badge-${id}`);
      const hex     = rgbToHex(r, g, b);
      const isOn    = (r + g + b) > 0;
      preview.style.background = hex;
      preview.style.boxShadow  = glowStyle(r, g, b);
      preview.classList.toggle('lit', isOn);
      badge.textContent = isOn ? 'ON' : 'OFF';
      badge.className   = `led-status-badge${isOn ? ' on' : ''}`;
    }

    async function setK10LEDColor(id) {
      const { r, g, b } = k10leds[id];
      const result = await apiPost(`/api/board/v1/leds/set?led=${id}&red=${r}&green=${g}&blue=${b}`);
      if (result.ok) {
        showToast(`K10 LED ${id} set to RGB(${r},${g},${b})`, 'ok');
      } else {
        showToast(`Failed to set K10 LED ${id}`, 'err');
      }
    }

    async function turnOffK10LED(id) {
      const result = await apiPost(`/api/board/v1/leds/off?led=${id}`);
      if (result.ok) {
        k10leds[id].r = 0; k10leds[id].g = 0; k10leds[id].b = 0;
        document.getElementById(`k10-picker-${id}`).value    = '#000000';
        document.getElementById(`k10-hex-${id}`).textContent = '#000000';
        updateK10LEDPreview(id, 0, 0, 0);
        showToast(`K10 LED ${id} turned off`, 'ok');
      } else {
        showToast(`Failed to turn off K10 LED ${id}`, 'err');
      }
    }

    async function turnOffAllK10LEDs() {
      const results = await Promise.all(k10leds.map(l =>
        apiPost(`/api/board/v1/leds/off?led=${l.id}`)
      ));
      if (results.every(r => r.ok)) {
        k10leds.forEach(l => { l.r = 0; l.g = 0; l.b = 0; });
        renderK10LEDs();
        showToast('All K10 LEDs turned off', 'ok');
      } else {
        showToast('Some K10 LEDs failed to turn off', 'err');
      }
    }

    async function fetchK10LEDStatus() {
      const result = await apiGet('/api/board/v1/leds');
      if (result.ok && result.data.leds) {
        result.data.leds.forEach(entry => {
          const idx = entry.led; // BoardInfoService uses key "led" (not "id")
          if (idx >= 0 && idx < 3) {
            k10leds[idx].r = entry.red;
            k10leds[idx].g = entry.green;
            k10leds[idx].b = entry.blue;
          }
        });
        renderK10LEDs();
        showToast('K10 LED status refreshed', 'ok');
      } else {
        showToast('Failed to fetch K10 LED status', 'err');
      }
    }

    // ═══════════════════════════════════════════════════════════════════════
    //  Collapsible sections
    // ═══════════════════════════════════════════════════════════════════════
    function toggleSection(sectionId, btnId) {
      const body = document.getElementById(sectionId);
      const btn  = document.getElementById(btnId);
      const collapsed = body.classList.toggle('collapsed');
      btn.classList.toggle('collapsed', collapsed);
    }

    // ═══════════════════════════════════════════════════════════════════════
    //  Init
    // ═══════════════════════════════════════════════════════════════════════
    document.addEventListener('DOMContentLoaded', () => {
      renderLEDs();
      renderK10LEDs();
      fetchServiceStatus();
      fetchLEDStatus();
      fetchK10LEDStatus();
    });
  </script>
</body>
</html>
