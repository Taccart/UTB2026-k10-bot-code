<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Servo Control - aMaker</title>
  <link rel="stylesheet" href="./amaker.css">
    <link rel="stylesheet" href="./ServoService.css">
</head>
<body>
  <nav class="topnav">
    <a href="./index.html">🧠 Bot</a>
    <a href="./ServoService.html" class="active">🛵 Moves</a>
    <a href="./CamService.html">📷 Cam</a>
    <a href="./LogService.html">📖 Logs</a>
    <a href="./MetricService.html">📊 Metrics</a>
    <a href="./MusicService.html">🎵 Music</a>
    <a href="./LedService.html">💡 LEDs</a>
  </nav>
  <h1 id="pageTitle">🛵 Servo and Motor Control Panel <span id="titleStatus" style="font-size: 0.6em; color: #999;"></span></h1>
  
  <div class="panel">
    <div class="global-button-group">
    <button onclick="refreshAllStatus()" class="btn">🔄 Refresh Status</button>
   <button onclick="stopAllServos()" class="btn">⏹️ Stop All Servos</button>
      <button onclick="setAllToMiddle()" class="btn">↔️ All Servos to Middle (0°)</button>
      <button onclick="stopAllMotors()" class="btn btn-danger">⏹️ Stop All Motors</button>
    </div>
  </div>

 <div style="display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;width:100%;box-sizing:border-box;">

  <div class="panel" style="flex:1 1 calc(50% - 6px);box-sizing:border-box;">
    <div class="collapsible-header" onclick="toggleSection('servoSection', 'servoBtnArrow')">
      <h2>Servo Channels</h2>
      <button class="collapse-btn" id="servoBtnArrow" title="Collapse/Expand">▼</button>
    </div>
    <div class="collapsible-body" id="servoSection">
      <div class="servo-grid" id="servoGrid">
        <!-- Servo cards will be generated here -->
      </div>
    </div>
  </div>

  <div class="panel" style="flex:1 1 calc(50% - 6px);box-sizing:border-box;">
    <div class="collapsible-header" onclick="toggleSection('motorSection', 'motorBtnArrow')">
      <h2>DC Motor Channels</h2>
      <button class="collapse-btn" id="motorBtnArrow" title="Collapse/Expand">▼</button>
    </div>
    <div class="collapsible-body" id="motorSection">
      <div style="background:#8a0000;border-radius:8px;padding:15px 10px;margin:5px 0;">
        <label class="control-label" style="color:#ffd0cc;font-weight:bold;">All Motors Speed (-100 to +100):</label>
        <div class="slider-container">
          <input type="range" id="all-motors-speed" min="-100" max="100" value="0"
                 oninput="setAllMotorsSpeedLive(this.value)">
          <span class="slider-value" id="all-motors-speed-value">0</span>
        </div>
      </div>
      <div class="motor-grid" id="motorGrid">
        <!-- Motor cards will be generated here -->
      </div>
    </div>
  </div>
 </div>
  <script src="./common.js"></script>
  <script src="./ServoService.js"></script>
  <div class="statusbar">
    <span class="status-left" id="page-status"></span>
    <span class="status-right">🛵 Servo & Motor Control</span>
  </div>
</body>
</html>
