<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>System & Environment</title>
  <link rel="stylesheet" href="./amaker.css">
    <link rel="stylesheet" href="./MetricService.css">
</head>
<body>
  <nav class="topnav">
    <a href="./index.html">🧠 Bot</a>
    <a href="./ServoService.html">🛵 Moves</a>
    <a href="./CamService.html">📷 Cam</a>
    <a href="./LogService.html">📖 Logs</a>
    <a href="./MetricService.html" class="active">📊 Metrics</a>
    <a href="./MusicService.html">🎵 Music</a>
    <a href="./LedService.html">💡 LEDs</a>
    <a href="./WebSocketJoystick.html" >🕹 Joystick</a>
  </nav>
  <div class="metrics-container">
    <h1 id="pageTitle">📊 System Metrics Dashboard <span id="titleStatus" style="font-size: 0.6em; color: #999;"></span></h1>
    
    <div class="panel">
      <button onclick="refreshAllMetrics()" class="btn">🔄 Refresh All</button>
      <button id="autoRefreshBtn" onclick="toggleAutoRefresh()" class="btn">⏱️ Auto-Refresh: OFF</button>
    </div>    <div class="metrics-grid">
      
      <div class="metric-panel">
        <div class="metric-header">
          <h2>🌡️ Sensors</h2>
          <button onclick="refreshSensors()" class="btn">🔄 Refresh</button>
        </div>
        <div id="sensors-content">
          <div class="loading-indicator">Loading sensor data...</div>
        </div>
      </div>

      
      <div class="metric-panel">
        <div class="metric-header">
          <h2>📡 UDP</h2>
          <button onclick="refreshUDP()" class="btn">🔄 Refresh</button>
        </div>
        <div id="udp-content">
          <div class="loading-indicator">Loading UDP statistics...</div>
        </div>
      </div>

      
      <div class="metric-panel">
        <div class="metric-header">
          <h2>🖥️ Board</h2>
          <button onclick="refreshBoardInfo()" class="btn">🔄 Refresh</button>
        </div>
        <div id="board-content">
          <div class="loading-indicator">Loading board information...</div>
        </div>
      </div>

      
      <div class="metric-panel">
        <div class="metric-header">
          <h2>🔋 Battery</h2>
          <button onclick="refreshBattery()" class="btn">🔄 Refresh</button>
        </div>
        <div id="battery-content">
          <div class="loading-indicator">Loading battery level...</div>
        </div>
      </div>



    </div>
  </div>

  <script src="./MetricService.js"></script>
  <div class="statusbar">
    <span class="status-left" id="page-status"></span>
    <span class="status-right">📊 Metrics</span>
  </div>
</body>
</html>
