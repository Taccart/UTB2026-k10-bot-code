<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>K10 Bot API Test</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="/favicon.svg">
  <style>
  </style>
</head>
<body>
  <h1>API Test Interface</h1>
  <div id="routes-container">
    <!-- Routes will be dynamically loaded -->
  </div>

  <script>
    const openAPISource = '/api/openapi.json';
    function testRoute(formId, method, path) {
      const form = document.getElementById('form' + formId);
      const inputs = form.querySelectorAll('input[name]');
      const responseArea = document.getElementById('response' + formId);
      const responseContent = document.getElementById('responseContent' + formId);
      
      // Build URL and separate parameters by type
      let url = path;
      const queryParams = new URLSearchParams();
      const bodyParams = {};
      const headers = {
        'Content-Type': 'application/json'
      };
      
      // Process each input based on its parameter type
      inputs.forEach(input => {
        const name = input.name;
        const value = input.value;
        const paramIn = input.getAttribute('data-param-in');
        
        if (value !== '') {
          if (paramIn === 'path') {
            // Replace path parameter
            url = url.replace('{' + name + '}', encodeURIComponent(value));
          } else if (paramIn === 'query') {
            // Add to query string
            queryParams.append(name, value);
          } else if (paramIn === 'header') {
            // Add to headers
            headers[name] = value;
          } else if (paramIn === 'body') {
            // Add to request body
            // Try to parse as number if input type is number
            const inputType = input.type;
            if (inputType === 'number') {
              bodyParams[name] = parseFloat(value);
            } else {
              bodyParams[name] = value;
            }
          } else {
            // Default: for GET use query, for POST/PUT use body
            if (method === 'GET') {
              queryParams.append(name, value);
            } else {
              bodyParams[name] = value;
            }
          }
        }
      });
      
      // Append query parameters to URL
      if (queryParams.toString()) {
        url += (url.includes('?') ? '&' : '?') + queryParams.toString();
      }
      
      responseContent.innerHTML = 'Loading...';
      responseArea.style.display = 'block';
      
      const fetchOptions = {
        method: method,
        headers: headers
      };
      
      // Add body for POST/PUT/PATCH methods if there are body parameters
      if (method !== 'GET' && Object.keys(bodyParams).length > 0) {
        fetchOptions.body = JSON.stringify(bodyParams);
      }
      
      fetch(url, fetchOptions)
        .then(response => {
          const contentType = response.headers.get('content-type');
          if (contentType && contentType.includes('application/json')) {
            return response.json().then(data => ({
              status: response.status,
              data: JSON.stringify(data, null, 2),
              ok: response.ok
            }));
          } else {
            return response.text().then(text => ({
              status: response.status,
              data: text,
              ok: response.ok
            }));
          }
        })
        .then(result => {
          const className = result.ok ? 'success' : 'error';
          responseContent.innerHTML = '<span class="' + className + '">Status: ' + result.status + '</span>\n\n' + result.data;
        })
        .catch(error => {
          responseContent.innerHTML = '<span class="error">Error: ' + error.message + '</span>';
        });
      
      return false;
    }

    // Load routes from OpenAPI spec
    fetch(openAPISource)
      .then(response => response.json())
      .then(data => {
        const container = document.getElementById('routes-container');
        let formId = 0;
        const sortedPaths = Object.keys(data.paths || {}).sort();
        for (const path of sortedPaths) {
          const methods = data.paths[path];
          for (const [method, details] of Object.entries(methods)) {
            const route = {
              method: method.toUpperCase(),
              path: path,
              description: details.summary || details.description || '',
              parameters: details.parameters || [],
              requestBody: details.requestBody
            };
            
            // Create route container
            const div = document.createElement('div');
            div.className = 'route-container';
            
            let html = `
              <div class="route-header">
                <span class="method method-${route.method}">${route.method}<a href="${route.path}" target="_blank">🔗</a></span>
                <span class="path">${route.path}</span>
              </div>
              <div class="description">${route.description}</div>
              <form id="form${formId}" onsubmit="return testRoute(${formId}, '${route.method}', '${route.path}')">
            `;
            
            // Check if we need to display any inputs
            const hasRequestBody = route.requestBody && 
                                   route.requestBody.content && 
                                   route.requestBody.content['application/json'] &&
                                   route.requestBody.content['application/json'].schema &&
                                   route.requestBody.content['application/json'].schema.properties;
            
            // Start table if we have parameters or requestBody
            if (route.parameters.length > 0 || hasRequestBody) {
              html += `<table class="param-table">`;
              
              // Add parameter inputs
              route.parameters.forEach(param => {
                const required = param.required ? '<span style="color:red;">*</span>' : '';
                const type = param.schema?.type || param.type || 'string';
                const example = param.example || '';
                const defaultValue = param.default || '';
                
                html += `
                  <tr class="param-group">
                    <td class="param-label">${param.name}${required} (${param.in}, ${type})</td>
                    <td>
                      <input type="text" class="param-input" name="${param.name}" 
                             data-param-in="${param.in}" 
                             placeholder="${param.description || ''}${example ? ' (e.g., ' + example + ')' : ''}"
                             ${defaultValue ? 'value="' + defaultValue + '"' : ''}
                             ${param.required ? 'required' : ''}>
                    </td>
                  </tr>
                `;
              });
              
              // Add requestBody fields if present
              if (hasRequestBody) {
                const jsonContent = route.requestBody.content['application/json'];
                const schema = jsonContent.schema;
                const requiredFields = schema.required || [];
                const example = jsonContent.example || {};
                
                Object.entries(schema.properties).forEach(([propName, propSchema]) => {
                  const isRequired = requiredFields.includes(propName);
                  const required = isRequired ? '<span style="color:red;">*</span>' : '';
                  const type = propSchema.type || 'string';
                  const description = propSchema.description || '';
                  const exampleValue = example[propName] !== undefined ? example[propName] : '';
                  const min = propSchema.minimum !== undefined ? ` min="${propSchema.minimum}"` : '';
                  const max = propSchema.maximum !== undefined ? ` max="${propSchema.maximum}"` : '';
                  
                  html += `
                    <tr class="param-group">
                      <td class="param-label">${propName}${required} (body, ${type})</td>
                      <td>
                        <input type="${type === 'integer' || type === 'number' ? 'number' : 'text'}" 
                               class="param-input" name="${propName}" 
                               data-param-in="body" 
                               placeholder="${description}${exampleValue !== '' ? ' (e.g., ' + exampleValue + ')' : ''}"
                               ${exampleValue !== '' ? 'value="' + exampleValue + '"' : ''}
                               ${min}${max}
                               ${isRequired ? 'required' : ''}>
                      </td>
                    </tr>
                  `;
                });
              }
              
              html += `</table>`;
            }
            
            html += `
                <button type="submit" class="btn btn-primary">Send ${route.method} Request</button>
              </form>
              <div class="response-area" id="response${formId}">
                <h4>Response:</h4>
                <div class="response-content" id="responseContent${formId}"></div>
              </div>
            `;
            
            div.innerHTML = html;
            container.appendChild(div);
            formId++;
          }
        }
      })
      .catch(err => {
        console.error('Failed to load API spec:', err);
        document.getElementById('routes-container').innerHTML = 
          '<div class="error">Failed to load API routes. Please check if '+openAPISource+' is available.</div>';
      });
  </script>
</body>
</html>
